leanos:
  version: 0.1.0
  workspace_type: startup
workspace:
  mode: new-product-workspace
  product_code_policy: do_not_create_app_code_during_initial_setup
  detected_project:
    has_git: false
    has_package_json: false
    has_source_dir: false
    has_github_dir: false
    has_vercel_config: false
    git_remote_origin: null
activation:
  mode: progressive
  current_stage: setup-seed
  progression_model: ai-standard/foundation/founder-progression-model.md
  progression_gates: ai-standard/foundation/progression-gates.md
  active_departments:
    - strategy
  inactive_departments:
    - operations
    - growth
  available_departments:
    - strategy
    - operations
    - growth
  active_areas:
    - strategy.business
    - strategy.product
    - strategy.roadmap
  inactive_areas:
    - operations.product-ops
    - operations.design
    - operations.engineering
    - operations.devops
    - operations.security
    - growth.customer-experience
    - growth.marketing
    - growth.finance
  available_areas:
    - strategy.business
    - strategy.product
    - strategy.roadmap
    - operations.product-ops
    - operations.design
    - operations.engineering
    - operations.devops
    - operations.security
    - growth.customer-experience
    - growth.marketing
    - growth.finance
  founder_selected_departments:
    - strategy
    - operations
    - growth
  founder_selected_areas:
    - strategy.business
    - strategy.product
    - strategy.roadmap
    - operations.product-ops
    - operations.design
    - operations.engineering
    - operations.devops
    - operations.security
    - growth.customer-experience
    - growth.marketing
    - growth.finance
  available_means: can_be_activated_later_not_path_exists
  missing_asset_behavior: return_activation_required
company:
  name: LeanOS Example Company
  stage: idea
  mode: founder-plus-ai-agents
product:
  name: Example AI Product
  type: ai-agent-product
  status: new-product
  description: An example AI-first product generated by LeanOS.
  target_user: AI-first founders
agent:
  entrypoint: AGENT.md
  chief_agent: enabled
  command_style: natural-language
  context_loading: lazy
  navigation_chain:
    enabled: true
    doc: ai-standard/foundation/navigation-chain.md
  standard_library: ai-standard
departments:
  active:
    - strategy
  routes:
    strategy:
      agent: strategy/AGENT.md
      readme: strategy/README.md
subareas:
  active:
    - key: strategy.business
      department: strategy
      path: strategy/business/README.md
      agent: strategy/business/AGENT.md
      readme: strategy/business/README.md
    - key: strategy.product
      department: strategy
      path: strategy/product/README.md
      agent: strategy/product/AGENT.md
      readme: strategy/product/README.md
    - key: strategy.roadmap
      department: strategy
      path: strategy/roadmap/README.md
      agent: strategy/roadmap/AGENT.md
      readme: strategy/roadmap/README.md
roles:
  ownership: area-first
  active:
    strategy.business:
      - business-strategist
    strategy.product:
      - product-strategist
      - product-manager
    strategy.roadmap:
      - roadmap-planner
skills:
  ownership: area-first
  active:
    strategy.business:
      - define-business-identity
      - clarify-operating-model
    strategy.product:
      - map-business-baseline
      - define-product
      - define-icp
      - define-value-proposition
      - define-business-model
      - define-mvp-validation-scope
      - evaluate-idea
      - check-coherence
    strategy.roadmap:
      - create-roadmap
      - prioritize-backlog
playbooks:
  ownership: area-first
  active:
    strategy.business:
      - business-foundation
    strategy.product:
      - idea-calibration
      - mvp-validation-scope
    strategy.roadmap:
      - roadmap-cycle-planning
workflows:
  ownership: department-local
  active:
    - idea-to-roadmap
  by_department:
    strategy:
      - key: idea-to-roadmap
        path: strategy/workflows/idea-to-roadmap.workflow.md
ai_standard:
  path: ai-standard/README.md
  foundation: ai-standard/foundation
  templates: ai-standard/templates
  checklists: ai-standard/checklists
  instructions: ai-standard/instructions
github:
  status: pending_user_token
  project_management: prepared
  token_source: env:LEANOS_GITHUB_TOKEN
