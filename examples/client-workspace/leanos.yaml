workflows:
  ownership: department-local
  active:
    - new-idea-intake
    - idea-to-roadmap
    - roadmap-to-github-project
    - roadmap-item-to-epic
    - epic-to-features
    - feature-to-delivery-cycle
    - post-merge-continuation
    - launch-learning-loop
  by_department:
    strategy:
      - key: new-idea-intake
        path: strategy/workflows/new-idea-intake.workflow.md
      - key: idea-to-roadmap
        path: strategy/workflows/idea-to-roadmap.workflow.md
      - key: roadmap-to-github-project
        path: strategy/workflows/roadmap-to-github-project.workflow.md
    operations:
      - key: roadmap-item-to-epic
        path: operations/workflows/roadmap-item-to-epic.workflow.md
      - key: epic-to-features
        path: operations/workflows/epic-to-features.workflow.md
      - key: feature-to-delivery-cycle
        path: operations/workflows/feature-to-delivery-cycle.workflow.md
      - key: post-merge-continuation
        path: operations/workflows/post-merge-continuation.workflow.md
    growth:
      - key: launch-learning-loop
        path: growth/workflows/launch-learning-loop.workflow.md
ai_standard:
  path: ai-standard/README.md
  foundation: ai-standard/foundation
  templates: ai-standard/templates
  checklists: ai-standard/checklists
  instructions: ai-standard/instructions
github:
  status: pending_user_token
  project_management: prepared
  token_source: env:LEANOS_GITHUB_TOKEN
