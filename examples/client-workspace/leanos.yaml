leanos:
  version: 0.1.0
  workspace_type: startup
workspace:
  mode: new-product-workspace
  product_code_policy: do_not_create_app_code_during_initial_setup
  detected_project:
    has_git: false
    has_package_json: false
    has_source_dir: false
    has_github_dir: false
    has_vercel_config: false
    git_remote_origin: null
paths:
  business_os: example-ai-product-os
  runtime: .leanos/runtime
  standard_library: .leanos/standard
  strategy: example-ai-product-os/strategy
  operations: example-ai-product-os/operations
  growth: example-ai-product-os/growth
activation:
  mode: progressive
  current_stage: setup-seed
  progression_model: .leanos/standard/foundation/founder-progression-model.md
  progression_gates: .leanos/standard/foundation/progression-gates.md
  active_departments:
    - strategy
  inactive_departments:
    - operations
    - growth
  available_departments:
    - strategy
    - operations
    - growth
  active_areas:
    - strategy.business
    - strategy.product
    - strategy.roadmap
  inactive_areas:
    - operations.product-ops
    - operations.design
    - operations.engineering
    - operations.devops
    - operations.security
    - operations.product-analytics
    - operations.external-integrations
    - growth.customer-experience
    - growth.marketing
    - growth.finance
  available_areas:
    - strategy.business
    - strategy.product
    - strategy.roadmap
    - operations.product-ops
    - operations.design
    - operations.engineering
    - operations.devops
    - operations.security
    - operations.product-analytics
    - operations.external-integrations
    - growth.customer-experience
    - growth.marketing
    - growth.finance
  founder_selected_departments:
    - strategy
    - operations
    - growth
  founder_selected_areas:
    - strategy.business
    - strategy.product
    - strategy.roadmap
    - operations.product-ops
    - operations.design
    - operations.engineering
    - operations.devops
    - operations.security
    - operations.product-analytics
    - operations.external-integrations
    - growth.customer-experience
    - growth.marketing
    - growth.finance
  available_means: can_be_activated_later_not_path_exists
  missing_asset_behavior: return_activation_required
company:
  name: LeanOS Example Company
  stage: idea
  mode: founder-plus-ai-agents
product:
  name: Example AI Product
  type: ai-agent-product
  status: new-product
  description: An example AI-first product generated by LeanOS.
  target_user: AI-first founders
agent:
  entrypoint: AGENT.md
  chief_agent: enabled
  command_style: natural-language
  context_loading: lazy
  navigation_chain:
    enabled: true
    doc: .leanos/standard/foundation/navigation-chain.md
  standard_library: .leanos/standard
departments:
  active:
    - strategy
  routes:
    strategy:
      agent: example-ai-product-os/strategy/AGENT.md
      readme: example-ai-product-os/strategy/README.md
subareas:
  active:
    - key: strategy.business
      department: strategy
      path: example-ai-product-os/strategy/business/README.md
      agent: example-ai-product-os/strategy/business/AGENT.md
      readme: example-ai-product-os/strategy/business/README.md
    - key: strategy.product
      department: strategy
      path: example-ai-product-os/strategy/product/README.md
      agent: example-ai-product-os/strategy/product/AGENT.md
      readme: example-ai-product-os/strategy/product/README.md
    - key: strategy.roadmap
      department: strategy
      path: example-ai-product-os/strategy/roadmap/README.md
      agent: example-ai-product-os/strategy/roadmap/AGENT.md
      readme: example-ai-product-os/strategy/roadmap/README.md
roles:
  ownership: area-first
  active:
    strategy.business:
      - business-strategist
    strategy.product:
      - product-strategist
      - product-manager
      - product-narrative-editor
    strategy.roadmap:
      - roadmap-planner
skills:
  ownership: area-first
  active:
    strategy.business:
      - business-identity
      - operating-model
      - business-model
    strategy.product:
      - business-baseline
      - product-core
      - mvp-validation-scope
      - coherence
      - product-readme
    strategy.roadmap:
      - roadmap
      - backlog-prioritization
playbooks:
  ownership: area-first
  active:
    strategy.business:
      - business-foundation
    strategy.product:
      - idea-calibration
      - mvp-validation-scope
    strategy.roadmap:
      - roadmap-cycle-planning
workflows:
  ownership: department-local
  active: []
  by_department:
    strategy: []
ai_standard:
  path: .leanos/standard/README.md
  foundation: .leanos/standard/foundation
  templates: .leanos/standard/templates
  checklists: .leanos/standard/checklists
  instructions: .leanos/standard/instructions
runtime:
  path: .leanos/runtime
  agent: .leanos/runtime/agent
  context: .leanos/runtime/context
  index: .leanos/runtime/index
  scratch: .leanos/runtime/scratch
  traces: .leanos/runtime/traces
github:
  status: pending_user_token
  project_management: prepared
  token_source: env:LEANOS_GITHUB_TOKEN
