leanos:
  version: 0.1.0
  workspace_type: startup
workspace:
  mode: new-product-workspace
  product_code_policy: do_not_create_app_code_during_initial_setup
  detected_project:
    has_git: false
    has_package_json: false
    has_source_dir: false
    has_github_dir: false
    has_vercel_config: false
    git_remote_origin: null
company:
  name: LeanOS Example Company
  stage: idea
  mode: founder-plus-ai-agents
product:
  name: Example AI Product
  type: ai-agent-product
  status: new-product
  description: An example AI-first product generated by LeanOS.
  target_user: AI-first founders
agent:
  entrypoint: AGENT.md
  chief_agent: enabled
  command_style: slash-and-natural-language
  context_loading: lazy
  navigation_chain:
    enabled: true
    doc: ai-standard/navigation-chain.md
  standard_library: ai-standard
departments:
  active:
    - strategy
    - operations
    - growth
  routes:
    strategy:
      agent: strategy/AGENT.md
      readme: strategy/README.md
    operations:
      agent: operations/AGENT.md
      readme: operations/README.md
    growth:
      agent: growth/AGENT.md
      readme: growth/README.md
subareas:
  active:
    - key: strategy.company
      department: strategy
      path: strategy/company/README.md
      agent: null
      readme: strategy/company/README.md
    - key: strategy.product
      department: strategy
      path: strategy/product/README.md
      agent: null
      readme: strategy/product/README.md
    - key: strategy.roadmap
      department: strategy
      path: strategy/roadmap/README.md
      agent: null
      readme: strategy/roadmap/README.md
    - key: strategy.validation
      department: strategy
      path: strategy/validation/README.md
      agent: null
      readme: strategy/validation/README.md
    - key: operations.core
      department: operations
      path: operations/core/README.md
      agent: null
      readme: operations/core/README.md
    - key: operations.design
      department: operations
      path: operations/design/README.md
      agent: operations/design/AGENT.md
      readme: operations/design/README.md
    - key: operations.engineering
      department: operations
      path: operations/engineering/README.md
      agent: null
      readme: operations/engineering/README.md
    - key: operations.devops
      department: operations
      path: operations/devops/README.md
      agent: null
      readme: operations/devops/README.md
    - key: operations.security
      department: operations
      path: operations/security/README.md
      agent: null
      readme: operations/security/README.md
    - key: growth.customer-experience
      department: growth
      path: growth/customer-experience/README.md
      agent: null
      readme: growth/customer-experience/README.md
    - key: growth.marketing
      department: growth
      path: growth/marketing/README.md
      agent: null
      readme: growth/marketing/README.md
    - key: growth.finance
      department: growth
      path: growth/finance/README.md
      agent: null
      readme: growth/finance/README.md
roles:
  ownership: area-first
  active:
    strategy.company:
      - company-strategist
    strategy.product:
      - product-strategist
      - product-manager
    strategy.roadmap:
      - roadmap-planner
    strategy.validation:
      - validation-researcher
    operations.core:
      - product-owner
      - technical-architect
    operations.design:
      - ux-researcher
      - product-designer
      - accessibility-specialist
      - ux-writer
    operations.engineering:
      - senior-developer
      - pr-reviewer
    operations.devops:
      - devops-engineer
      - github-devops
    operations.security:
      - security-reviewer
    growth.customer-experience:
      - cx-lead
    growth.marketing:
      - growth-lead
    growth.finance:
      - finance-operator
skills:
  ownership: area-first
  active:
    strategy.company:
      - define-company
      - clarify-operating-model
    strategy.product:
      - define-product
      - define-icp
      - define-value-proposition
      - define-business-model
      - evaluate-idea
      - check-coherence
    strategy.roadmap:
      - create-roadmap
      - prioritize-backlog
      - prepare-roadmap-sync
    strategy.validation:
      - define-assumptions
      - create-interview-script
      - define-success-metrics
    operations.core:
      - define-mvp
      - write-acceptance-criteria
      - check-delivery-coherence
      - shape-epic
      - write-subissue-criteria
      - define-architecture
      - create-api-contract
    operations.design:
      - user-research
      - user-flow-mapping
      - design-system
      - screen-specification
      - microcopy
      - accessibility
      - design-review
    operations.engineering:
      - plan-implementation
      - create-branch
      - write-tests
      - create-pr
      - review-pr
    operations.devops:
      - setup-ci
      - plan-deployment
      - configure-github-project
      - define-observability
    operations.security:
      - threat-model
      - review-security
    growth.customer-experience:
      - map-customer-feedback
      - synthesize-support-patterns
    growth.marketing:
      - define-positioning
      - create-landing-page-copy
      - create-launch-plan
    growth.finance:
      - model-unit-economics
      - review-pricing
playbooks:
  ownership: area-first
  active:
    strategy.company:
      - company-foundation
    strategy.product:
      - product-strategy
    strategy.roadmap:
      - validation-cycle-planning
      - roadmap-sync-prep
    strategy.validation:
      - mvp-validation
    operations.core:
      - mvp-delivery
      - epic-to-subissues
      - architecture-planning
    operations.design:
      - design-foundation
      - user-research
      - mvp-ux-flow
      - accessibility-review
      - ux-writing
    operations.engineering:
      - branch-from-issue
      - issue-to-pr
      - test-planning
      - pr-validation
    operations.devops:
      - setup-ci-cd
      - plan-deployment
      - configure-github-project
      - configure-environments
      - define-observability
      - release-operations
    operations.security:
      - security-review
      - security-checklist
    growth.customer-experience:
      - customer-learning-loop
    growth.marketing:
      - mvp-launch
    growth.finance:
      - finance-review
workflows:
  ownership: department-local
  active:
    - idea-to-roadmap
    - strategy-validation-cycle
    - roadmap-to-github-project
    - mvp-to-pr
    - issue-delivery-cycle
    - post-merge-continuation
    - launch-learning-loop
  by_department:
    strategy:
      - key: idea-to-roadmap
        path: strategy/workflows/idea-to-roadmap.workflow.md
      - key: strategy-validation-cycle
        path: strategy/workflows/strategy-validation-cycle.workflow.md
      - key: roadmap-to-github-project
        path: strategy/workflows/roadmap-to-github-project.workflow.md
    operations:
      - key: mvp-to-pr
        path: operations/workflows/mvp-to-pr.workflow.md
      - key: issue-delivery-cycle
        path: operations/workflows/issue-delivery-cycle.workflow.md
      - key: post-merge-continuation
        path: operations/workflows/post-merge-continuation.workflow.md
    growth:
      - key: launch-learning-loop
        path: growth/workflows/launch-learning-loop.workflow.md
ai_standard:
  path: ai-standard/README.md
  templates: ai-standard/templates
  checklists: ai-standard/checklists
  instructions: ai-standard/instructions
github:
  status: pending_user_token
  project_management: prepared
  token_source: env:LEANOS_GITHUB_TOKEN
