leanos:
  version: 0.1.0
  workspace_type: startup
workspace:
  mode: new-product-workspace
  product_code_policy: do_not_create_app_code_during_initial_setup
  detected_project:
    has_git: false
    has_package_json: false
    has_source_dir: false
    has_github_dir: false
    has_vercel_config: false
    git_remote_origin: null
company:
  name: LeanOS Example Company
  stage: idea
  mode: founder-plus-ai-agents
product:
  name: Example AI Product
  type: ai-agent-product
  status: new-product
  description: An example AI-first product generated by LeanOS.
  target_user: AI-first founders
agent:
  entrypoint: AGENT.md
  chief_agent: enabled
  command_style: slash-and-natural-language
  context_loading: lazy
  navigation_chain:
    enabled: true
    doc: ai-standard/foundation/navigation-chain.md
  standard_library: ai-standard
departments:
  active:
    - strategy
    - operations
    - growth
  routes:
    strategy:
      agent: strategy/AGENT.md
      readme: strategy/README.md
    operations:
      agent: operations/AGENT.md
      readme: operations/README.md
    growth:
      agent: growth/AGENT.md
      readme: growth/README.md
subareas:
  active:
    - key: strategy.business
      department: strategy
      path: strategy/business/README.md
      agent: strategy/business/AGENT.md
      readme: strategy/business/README.md
    - key: strategy.product
      department: strategy
      path: strategy/product/README.md
      agent: strategy/product/AGENT.md
      readme: strategy/product/README.md
    - key: strategy.roadmap
      department: strategy
      path: strategy/roadmap/README.md
      agent: strategy/roadmap/AGENT.md
      readme: strategy/roadmap/README.md
    - key: operations.product-ops
      department: operations
      path: operations/product-ops/README.md
      agent: operations/product-ops/AGENT.md
      readme: operations/product-ops/README.md
    - key: operations.design
      department: operations
      path: operations/design/README.md
      agent: operations/design/AGENT.md
      readme: operations/design/README.md
    - key: operations.engineering
      department: operations
      path: operations/engineering/README.md
      agent: operations/engineering/AGENT.md
      readme: operations/engineering/README.md
    - key: operations.devops
      department: operations
      path: operations/devops/README.md
      agent: operations/devops/AGENT.md
      readme: operations/devops/README.md
    - key: operations.security
      department: operations
      path: operations/security/README.md
      agent: operations/security/AGENT.md
      readme: operations/security/README.md
    - key: growth.customer-experience
      department: growth
      path: growth/customer-experience/README.md
      agent: growth/customer-experience/AGENT.md
      readme: growth/customer-experience/README.md
    - key: growth.marketing
      department: growth
      path: growth/marketing/README.md
      agent: growth/marketing/AGENT.md
      readme: growth/marketing/README.md
    - key: growth.finance
      department: growth
      path: growth/finance/README.md
      agent: growth/finance/AGENT.md
      readme: growth/finance/README.md
roles:
  ownership: area-first
  active:
    strategy.business:
      - business-strategist
    strategy.product:
      - product-strategist
      - product-manager
    strategy.roadmap:
      - roadmap-planner
    operations.product-ops:
      - product-owner
      - delivery-architect
    operations.design:
      - ux-researcher
      - product-designer
      - accessibility-specialist
      - ux-writer
    operations.engineering:
      - senior-developer
      - test-engineer
      - pr-reviewer
    operations.devops:
      - devops-engineer
      - github-devops
      - release-manager
    operations.security:
      - security-reviewer
      - application-security-engineer
      - cloud-security-reviewer
      - data-protection-reviewer
    growth.customer-experience:
      - cx-lead
    growth.marketing:
      - growth-lead
    growth.finance:
      - finance-operator
