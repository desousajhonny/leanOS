  ownership: area-first
  active:
    strategy.business:
      - business-foundation
    strategy.product:
      - product-strategy
    strategy.roadmap:
      - roadmap-cycle-planning
      - roadmap-sync-prep
    operations.product-ops:
      - delivery-scope-planning
      - mvp-delivery
      - epic-to-features
      - delivery-readiness
    operations.design:
      - design-foundation
      - component-readiness
      - user-research
      - mvp-ux-flow
      - accessibility-review
      - ux-writing
    operations.engineering:
      - engineering-delivery
      - branch-from-issue
      - component-implementation
      - prepare-pr
      - test-planning
      - pr-validation
    operations.devops:
      - setup-ci-cd
      - plan-deployment
      - configure-github-project
      - configure-environments
      - define-observability
      - release-operations
    operations.security:
      - security-foundation
      - pre-mvp-security-checklist
