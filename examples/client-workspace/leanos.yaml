leanos:
  version: 0.1.0
  workspace_type: startup
company:
  name: LeanOS Example Company
  stage: idea
  mode: founder-plus-ai-agents
product:
  name: Example AI Product
  type: ai-agent-product
  status: new-product
  description: An example AI-first product generated by LeanOS.
  target_user: AI-first founders
agent:
  entrypoint: AGENT.md
  chief_agent: enabled
  command_style: slash-and-natural-language
  context_loading: lazy
  navigation_chain:
    enabled: true
    doc: .leanos/ai-standard/navigation-chain.md
  standard_library: .leanos/ai-standard
governance:
  mode: balanced
github:
  status: not_configured
  project_sync: disabled
architecture:
  stack_status: undefined
departments:
  active:
    - product
    - design
    - engineering
    - validation
    - growth
roles:
  ownership: department-first
  active:
    product:
      - product-strategist
      - product-manager
    design:
      - ux-lead
    engineering:
      - senior-developer
      - ai-architect
      - pr-reviewer
    validation:
      - validation-researcher
    growth:
      - growth-lead
skills:
  ownership: department-first
playbooks:
  ownership: department-first
workflows:
  active:
    - new-product-mvp-validation
    - existing-product-audit
    - issue-to-pr
    - launch-and-learn
ai_standard:
  enabled: true
  path: .leanos/ai-standard
  templates_path: .leanos/ai-standard/templates
  checklists_path: .leanos/ai-standard/checklists
  instructions_path: .leanos/ai-standard/instructions
