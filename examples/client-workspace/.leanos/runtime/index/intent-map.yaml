version: 1
purpose: Classificar pedidos em linguagem natural sem transformar o root AGENT.md em inventário de casos.
routing_policy:
  root_loads_department_only: true
  deep_hints_are_not_direct_loads: true
  check_leanos_yaml_before_route: true
  use_routing_map_for_active_department_path: true
  inactive_area_response: activation_required
global_protocols:
  status_readiness: where-we-are
  trace_diagnostics: chief-trace
  leanos_update: lean-os update
  framework_assets: standard-library
intents:
  setup_or_resume:
    signals:
      - vamos começar
      - iniciar LeanOS
      - retomar
      - continuar
      - tenho uma ideia
      - calibrar ideia
    owner_department: strategy
    required_areas:
      - strategy.product
    activation_required: null
    expected_chain:
      area: strategy.product
      role: product-strategist
      skills:
        - business-baseline
        - product-core
      playbook: idea-calibration
  business_foundation:
    signals:
      - missão
      - visão
      - princípios
      - modelo de negócio
      - business model canvas
      - como a empresa opera
    owner_department: strategy
    required_areas:
      - strategy.business
    activation_required: null
    expected_chain:
      area: strategy.business
      role: business-strategist
      skills:
        - business-identity
        - operating-model
        - business-model
      playbook: business-foundation
  product_readme:
    signals:
      - melhorar README
      - README do produto
      - criar repositório
      - apresentação do produto no GitHub
    owner_department: strategy
    required_areas:
      - strategy.product
    activation_required: null
    expected_chain:
      area: strategy.product
      role: product-narrative-editor
      skill: product-readme
      playbook: null
  mvp_validation_scope:
    signals:
      - escopo de validação
      - primeiro MVP
      - validar ideia
      - menor MVP
      - o que o MVP deve validar
    owner_department: strategy
    required_areas:
      - strategy.product
    activation_required: null
    expected_chain:
      area: strategy.product
      role: product-strategist
      skill: mvp-validation-scope
      playbook: mvp-validation-scope
  roadmap_prioritization:
    signals:
      - roadmap
      - priorizar
      - backlog
      - ciclo
      - milestone
    owner_department: strategy
    required_areas:
      - strategy.roadmap
    activation_required: null
    expected_chain:
      area: strategy.roadmap
      role: roadmap-planner
      skills:
        - roadmap
        - backlog-prioritization
      playbook: roadmap-cycle-planning
  delivery_planning:
    signals:
      - MVP backlog
      - criar Epic
      - quebrar Epic
      - criar Features
      - escopo de entrega
    owner_department: operations
    required_areas:
      - operations.product-ops
    activation_required: operations.product-ops
    expected_chain:
      area: operations.product-ops
      role: product-owner
      skills:
        - delivery-scope
        - shape-epic
        - feature-criteria
      playbooks:
        - mvp-backlog-planning
        - delivery-item-to-epic
        - epic-to-features
  implementation:
    signals:
      - implementar
      - desenvolver feature
      - codar
      - criar branch
      - abrir PR
    owner_department: operations
    required_areas:
      - operations.product-ops
      - operations.engineering
    activation_required: operations.engineering
    expected_chain:
      area: operations.engineering
      role: senior-developer
      skills:
        - implementation-planning
        - feature-branching
        - test-coverage
        - pull-request
      workflow: feature-to-delivery-cycle
  pr_review:
    signals:
      - revisar PR
      - review do PR
      - validar PR
      - rodar revisão agora
    owner_department: operations
    required_areas:
      - operations.engineering
    activation_required: operations.engineering
